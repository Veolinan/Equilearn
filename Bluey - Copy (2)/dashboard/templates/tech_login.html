<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Dashboard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="role-page">

  <div class="role-logo">⚙️ <span>Technical</span> Dashboard</div>
  <p class="role-sub">Enter PIN to access technical information</p>

  {% if error %}
  <div class="alert alert-error mb-24" style="width:min(360px,90vw)">
    ⚠ {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/technical/login"
        style="width:min(360px,90vw);display:flex;flex-direction:column;gap:14px">

    <div class="form-group">
      <label class="form-label" style="text-align:center;display:block">PIN</label>
      <input class="form-control" type="password" name="pin" id="pin-input"
             placeholder="Enter PIN"
             inputmode="numeric" pattern="[0-9]*"
             maxlength="8" autofocus
             style="text-align:center;font-size:1.6rem;letter-spacing:.4rem;
                    padding:14px;border-radius:12px">
      <p class="form-hint" style="text-align:center;margin-top:6px">
        Default PIN is <strong>1234</strong> — change it in the Technical settings.
      </p>
    </div>

    <!-- PIN pad -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto">
      {% for n in ['1','2','3','4','5','6','7','8','9','','0','⌫'] %}
      <button type="button"
              onclick="pinPad('{{ n }}')"
              style="padding:16px;border-radius:10px;font-size:1.2rem;font-weight:700;
                     background:var(--card2);border:1px solid var(--border);color:var(--text);
                     cursor:pointer;transition:.12s"
              onmouseover="this.style.background='var(--border)'"
              onmouseout="this.style.background='var(--card2)'"
              {% if n=='' %}disabled style="visibility:hidden"{% endif %}>
        {{ n }}
      </button>
      {% endfor %}
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:8px;padding:14px">
      🔓 Unlock
    </button>

    <a href="/" style="text-align:center;color:var(--muted);font-size:.85rem;margin-top:4px">
      ← Back to role selector
    </a>

  </form>

</div>

<script>
function pinPad(val) {
  const input = document.getElementById('pin-input')
  if (val === '⌫') {
    input.value = input.value.slice(0, -1)
  } else if (val !== '' && input.value.length < 8) {
    input.value += val
  }
  input.focus()
}
// Auto-submit on 4+ digit entry via keyboard
document.getElementById('pin-input').addEventListener('input', e => {
  if (e.target.value.length >= 4) {
    // Don't auto-submit — let user confirm with button
  }
})
</script>
</body>
</html>
