<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Touchless Tutor{% endblock %} — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// Apply saved theme before paint to prevent flash
(function(){
  const t = localStorage.getItem('tt-theme') || 'dark'
  document.documentElement.setAttribute('data-theme', t)
})()
</script>
</head>
<body>

{% if show_nav %}
<nav class="topnav">
  <a class="topnav-brand" href="/">
    🎓 <span>Touchless</span> Tutor
  </a>
  <div class="topnav-links">
    <a href="/parent"    class="{% if active == 'parent'    %}active{% endif %}">
      <span class="icon">👨‍👩‍👧</span> Parent
    </a>
    <a href="/teacher"   class="{% if active == 'teacher'   %}active{% endif %}">
      <span class="icon">👩‍🏫</span> Teacher
    </a>
    <a href="/technical" class="{% if active == 'technical' %}active{% endif %}">
      <span class="icon">⚙️</span> Technical
    </a>
  </div>
  <div class="topnav-right">
    <span class="last-updated" id="last-updated"></span>
    <!-- Theme switcher -->
    <div class="theme-switcher" id="theme-switcher">
      <button class="theme-btn" data-theme="dark"    title="Dark theme">🌙</button>
      <button class="theme-btn" data-theme="light"   title="Light theme">☀️</button>
      <button class="theme-btn" data-theme="ocean"   title="Ocean theme">🌊</button>
      <button class="theme-btn" data-theme="forest"  title="Forest theme">🌿</button>
      <button class="theme-btn" data-theme="contrast"title="High contrast">◑</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="hardRefresh()">↻ Refresh</button>
    <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Print</button>
  </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<!-- ── Shared JS utilities ─────────────────────────────────── -->
<script>
// ── Chart defaults ──────────────────────────────────────────
const CD = {
  responsive: true,
  maintainAspectRatio: true,
  animation: { duration: 400 },
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: 'var(--tooltip-bg, #1c1836)',
    borderColor: 'var(--border)',
    borderWidth: 1,
    titleColor: 'var(--text)',
    bodyColor: 'var(--muted)',
    padding: 10,
    cornerRadius: 8,
  }},
  scales: {
    x: {
      display: true,
      grid: { color: 'rgba(128,128,128,.15)' },
      ticks: { color: 'var(--muted2, #4a4470)', font: { size: 10, family: 'Nunito' }, maxTicksLimit: 7 }
    },
    y: {
      grid: { color: 'rgba(128,128,128,.15)' },
      ticks: { color: 'var(--muted, #7a72aa)', font: { size: 11, family: 'Nunito' } }
    }
  }
}
function yPct(cd) {
  return {...cd, scales:{...cd.scales,
    y:{...cd.scales.y, min:0, max:100,
       ticks:{...cd.scales.y.ticks, callback:v=>v+'%'}}}}
}
function ySeconds(cd) {
  return {...cd, scales:{...cd.scales,
    y:{...cd.scales.y, min:0,
       ticks:{...cd.scales.y.ticks, callback:v=>v+'s'}}}}
}

// ── Colours ─────────────────────────────────────────────────
const C = {
  purple:'#8250ff', cyan:'#3cdcff', green:'#32dc64',
  amber:'#ffd428',  red:'#ff4f4f',  blue:'#3cb4ff',
  pink:'#ff6eb4',   orange:'#ff9050',
}
function rgba(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}
function dataset(data,color,opts={}) {
  return {data,borderColor:color,backgroundColor:rgba(color,.1),
          fill:true,tension:.38,pointRadius:2.5,
          pointHoverRadius:5,borderWidth:2,...opts}
}

// ── Pill HTML ────────────────────────────────────────────────
function pill(status) {
  const map={mastered:['mastered','✓ Mastered'],started:['started','◔ Started'],
             untouched:['untouched','○ Not started']}
  const [cls,lbl]=map[status]||['untouched','—']
  return `<span class="pill pill-${cls}">${lbl}</span>`
}
function barHtml(pct) {
  const bcls=pct>=80?'bar-green':pct>=50?'bar-amber':'bar-red'
  return `<div class="bar-track" style="width:90px;display:inline-block">
    <div class="bar-fill ${bcls}" style="width:${pct}%"></div></div>`
}

// ── Heatmap ──────────────────────────────────────────────────
function renderHeatmap(cells,containerId) {
  const max=Math.max(...cells.map(c=>c.questions),1)
  document.getElementById(containerId).innerHTML=
    cells.map(c=>{
      const lvl=c.questions===0?0:Math.min(5,1+Math.floor(c.questions/max*4.99))
      return `<div class="hm-cell hm-${lvl}" data-tip="${c.date}: ${c.questions} q"></div>`
    }).join('')
}

// ── Refresh ──────────────────────────────────────────────────
function hardRefresh(){location.reload()}
function setUpdated(){
  const el=document.getElementById('last-updated')
  if(el) el.textContent='Updated '+new Date().toLocaleTimeString()
}

// ── Tabs ─────────────────────────────────────────────────────
function initTabs(barId) {
  const bar=document.getElementById(barId)
  if(!bar) return
  const btns=bar.querySelectorAll('.tab-btn')
  const container=bar.parentElement
  const panels=container.querySelectorAll(':scope > .tab-panel')
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'))
      panels.forEach(p=>p.classList.remove('active'))
      btn.classList.add('active')
      const t=document.getElementById(btn.dataset.tab)
      if(t) t.classList.add('active')
    })
  })
}

// ── Modal ────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.addEventListener('click',e=>{
  if(e.target.classList.contains('modal-bg')) e.target.classList.remove('open')
})

// ── Theme ────────────────────────────────────────────────────
const THEMES = ['dark','light','ocean','forest','contrast']

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme)
  localStorage.setItem('tt-theme', theme)
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.theme===theme)
  })
}

document.addEventListener('DOMContentLoaded', ()=>{
  const saved = localStorage.getItem('tt-theme') || 'dark'
  applyTheme(saved)
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>applyTheme(btn.dataset.theme))
  })
})
</script>

{% block scripts %}{% endblock %}

</body>
</html>
